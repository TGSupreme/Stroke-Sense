<!doctype html>
<html class="no-js" lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Stroke Sense | Health Sense</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <!-- CSS here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/owl.carousel.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slicknav.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flaticon.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animate.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/magnific-popup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome-all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themify-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slick.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nice-select.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1 0 auto;
            background-image: url("{{ url_for('static', filename='img/hero/Main-bg.png') }}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: top center;
            padding-top: 0;
            padding-bottom: 60px;
        }


        .footer-wrappr {
            flex-shrink: 0;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .login-box {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: #f9f9f9;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .login-box h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        .login-box .form-group input,
        .login-box .form-group textarea {
            height: 45px;
        }

        .login-box .btn {
            width: 100%;
        }

        .form-check {
            margin-left: 20px;
        }
    </style>
</head>

<body>
        <!-- ? Preloader Start -->
        <div id="preloader-active">
            <div class="preloader d-flex align-items-center justify-content-center">
                <div class="preloader-inner position-relative">
                    <div class="preloader-circle"></div>
                    <div class="preloader-img pere-text">
                        <img src="{{ url_for('static', filename='img/logo/loder.png') }}" alt="">
                    </div>
                </div>
            </div>
        </div>
        <!-- Preloader Start -->
    <!-- Header (same as your main template) -->
    {% include 'header.html' %}

    <!-- Main Stroke Prediction Form -->
    <main>
        <div class="container login-container">
            <div class="login-box">
                <h2>Stroke Prediction Form</h2>
                <form action="{{ url_for('predict') }}" method="post" id="contactForm" novalidate="novalidate">
    
                    <!-- Gender -->
<div class="mb-4">
    <label class="form-label">Gender:</label>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="female" name="gender" value="0"
        {% if user.gender == 0 %}checked{% endif %} required>
        <label class="form-check-label option" for="female">Female</label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="male" name="gender" value="1"
        {% if user.gender == 1 %}checked{% endif %}>
        <label class="form-check-label option" for="male">Male</label>
    </div>
</div>

    
                    <!-- Hypertension -->
<div class="mb-4">
    <label class="form-label">Hypertension:</label>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="no_ht" name="hypertension" value="0"
        {% if user.hypertension == 0 %}checked{% endif %} required>
        <label class="form-check-label option" for="no_ht">No</label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="yes_ht" name="hypertension" value="1"
        {% if user.hypertension == 1 %}checked{% endif %}>
        <label class="form-check-label option" for="yes_ht">Yes</label>
    </div>
</div>

    
                    <!-- Heart Disease -->
<div class="mb-4">
    <label class="form-label">Heart Disease:</label>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="no_hd" name="heart_disease" value="0"
        {% if user.heart_disease == 0 %}checked{% endif %} required>
        <label class="form-check-label option" for="no_hd">No</label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" id="yes_hd" name="heart_disease" value="1"
        {% if user.heart_disease == 1 %}checked{% endif %}>
        <label class="form-check-label option" for="yes_hd">Yes</label>
    </div>
</div>

    
                    <!-- Age -->
<div class="mb-4">
    <label for="age" class="form-label">Age:</label>
    <input type="number" class="form-control" name="age" value="{{ user.age }}" required>
</div>

    
                    <!-- Average Glucose Level -->
<div class="mb-4">
    <label for="avg_glucose_level" class="form-label">Average Glucose Level:</label>
    <input type="number" step="any" class="form-control" name="avg_glucose_level"
    value="{{ user.avg_glucose_level }}" required>
</div>

    
                    <!-- BMI -->
<div class="mb-4">
    <label for="bmi" class="form-label">BMI:</label>
    <input type="number" step="any" class="form-control" name="bmi"
    value="{{ user.bmi }}" required>
</div>

    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary mt-4">Predict Now</button>
                </form>
            </div>
        </div>
    </main>

    {% include 'footer.html' %}

        <!-- JS here -->
        <script src="{{ url_for('static', filename='js/vendor/modernizr-3.5.0.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/vendor/jquery-1.12.4.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/popper.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/jquery.slicknav.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/owl.carousel.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/slick.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/wow.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/animated.headline.js') }}"></script>
        <script src="{{ url_for('static', filename='js/jquery.nice-select.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/jquery.sticky.js') }}"></script>
        <script src="{{ url_for('static', filename='js/jquery.magnific-popup.js') }}"></script>
        <script src="{{ url_for('static', filename='js/plugins.js') }}"></script>
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
        <script>
            window.onload = function () {
                const preloader = document.getElementById('preloader-active');
                if (preloader) {
                    preloader.style.display = 'none';
                }
            };
        </script>
</body>

</html>
