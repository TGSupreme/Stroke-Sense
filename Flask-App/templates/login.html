<!doctype html>
<html class="no-js" lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Login | Health Sense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <!-- CSS here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->



    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1 0 auto;
            background-image: url("{{ url_for('static', filename='img/hero/Main-bg.png') }}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: top center;
            padding-top: 0;
            padding-bottom: 60px;
        }

        .footer-wrappr {
            flex-shrink: 0;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .login-box {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            background: #f9f9f9;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .login-box h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        .login-box .form-group input {
            height: 45px;
        }

        .login-box .btn {
            width: 100%;
        }

        .custom-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1055;
            display: none;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        .custom-toast-success {
            background-color: #28a745;
            /* Green */
            color: white;
        }

        .custom-toast-danger {
            background-color: #dc3545;
            /* Red */
            color: white;
        }

        .custom-toast-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .custom-toast-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            margin-left: 15px;
            cursor: pointer;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- ? Preloader Start -->
    <div id="preloader-active">
        <div class="preloader d-flex align-items-center justify-content-center">
            <div class="preloader-inner position-relative">
                <div class="preloader-circle"></div>
                <div class="preloader-img pere-text">
                    <img src="{{ url_for('static', filename='img/logo/loder.png') }}" alt="">
                </div>
            </div>
        </div>
    </div>
    <!-- Preloader Start -->
    <!-- Header (same as your main template) -->
    {% include 'header.html' %}

    <!-- Main Login Area -->
    <main>
        <div class="container login-container">
            <div class="login-box">
                <h2>Login to Health Sense</h2>
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email"
                            required>
                    </div>
                    <div class="form-group mt-3">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                            required>
                    </div>
                    <div class="form-group form-check mt-3">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary mt-4">Login</button>
                    <p class="mt-3 text-center">Don't have an account? <a href="{{ url_for('register') }}"
                            style="color: #5AAC4E; text-decoration: underline; "> Sign Up</a></p>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    {% include 'footer.html' %}

    <!-- JS here -->
    <script src="{{ url_for('static', filename='js/vendor/modernizr-3.5.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/vendor/jquery-1.12.4.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popper.min.js') }}"></script>
    <!-- <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script> -->
    <script src="{{ url_for('static', filename='js/jquery.slicknav.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/owl.carousel.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/slick.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animated.headline.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.nice-select.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.sticky.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.magnific-popup.js') }}"></script>
    <script src="{{ url_for('static', filename='js/plugins.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        window.onload = function () {
            const preloader = document.getElementById('preloader-active');
            if (preloader) {
                preloader.style.display = 'none';
            }
        };
    </script>

    <!-- Custom Toast -->
    <div id="custom-toast" class="custom-toast">
        <div class="custom-toast-body">
            <span id="custom-toast-message"></span>
            <button onclick="hideCustomToast()" class="custom-toast-close">&times;</button>
        </div>
    </div>


    <script>
        function showCustomToast(message, messageType) {
            const toast = document.getElementById('custom-toast');
            const messageEl = document.getElementById('custom-toast-message');
            messageEl.textContent = message;

            // Remove any previous message type class
            toast.classList.remove('custom-toast-success', 'custom-toast-danger');

            // Add the correct class based on message type
            if (messageType === 'success') {
                toast.classList.add('custom-toast-success');
            } else if (messageType === 'danger') {
                toast.classList.add('custom-toast-danger');
            }

            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function hideCustomToast() {
            document.getElementById('custom-toast').style.display = 'none';
        }

        // Show message from Flask flash
        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        window.onload = function () {
            const message = "{{ messages[0][1] }}"; // Get the message content
            const messageType = "{{ messages[0][0] }}"; // Get the category (success, danger, etc.)
            showCustomToast(message, messageType); // Show the toast with correct styling
        };
        {% endif %}
        {% endwith %}

    </script>



</body>

</html>
