        }

        .login-container {
            display: flex;
            align-items: center;

        .login-box {
            max-width: 600px;

        .login-box h2 {

        }

        .login-box .btn {

<body>
    <!--? Preloader Start -->

        <div class="preloader d-flex align-items-center justify-content-center">
            <div class="preloader-inner position-relative">

    <header>
        <!--? Header Start -->
        <div class="header-area">
            <div class="main-header header-sticky">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <!-- Logo -->
                        <div class="col-xl-2 col-lg-2 col-md-1">
                            <div class="logo">
                                <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='img/logo/logo.png') }}" alt=""></a>
                            </div>
                        </div>
                        <div class="col-xl-10 col-lg-10 col-md-10">
                            <div class="menu-main d-flex align-items-center justify-content-end">
                                <!-- Main-menu -->
                                <div class="main-menu f-right d-none d-lg-block">
                                    <nav> 
                                        <ul id="navigation">
                                            <li><a href="{{ url_for('home') }}">Home</a></li>

                                        </ul>
                                    </nav>
                                </div>
                                <div class="header-right-btn f-right d-none d-lg-block ml-15">

                                </div>
                            </div>
                        </div>   
                        <!-- Mobile Menu -->
                        <div class="col-12">
                            <div class="mobile_menu d-block d-lg-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Header End -->
    </header>

    <!-- Main Stroke Prediction Form -->
    <main>
        <div class="container login-container">
            <div class="login-box">
                <h2>Enter Details</h2>
                <form action="/predict" method="post" id="contactForm" novalidate="novalidate">

                    <!-- Gender -->
                    <div class="mb-4">
                        <label class="form-label">Gender:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="female" name="gender" value="0" required>
                            <label class="form-check-label option" for="female">Female</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="male" name="gender" value="1">
                            <label class="form-check-label option" for="male">Male</label>
                        </div>
                    </div>

                    <!-- Hypertension -->
                    <div class="mb-4">
                        <label class="form-label">Hypertension:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="no_ht" name="hypertension" value="0"
                                required>
                            <label class="form-check-label option" for="no_ht">No</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="yes_ht" name="hypertension" value="1">
                            <label class="form-check-label option" for="yes_ht">Yes</label>
                        </div>
                    </div>

                    <!-- Heart Disease -->
                    <div class="mb-4">
                        <label class="form-label">Heart Disease:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="no_hd" name="heart_disease" value="0"
                                required>
                            <label class="form-check-label option" for="no_hd">No</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" id="yes_hd" name="heart_disease" value="1">
                            <label class="form-check-label option" for="yes_hd">Yes</label>
                        </div>
                    </div>

                    <!-- Age -->
                    <div class="mb-4">
                        <label for="age" class="form-label">Age:</label>
                        <input type="number" class="form-control" name="age" required>
                    </div>

                    <!-- Average Glucose Level -->
                    <div class="mb-4">
                        <label for="avg_glucose_level" class="form-label">Average Glucose Level:</label>
                        <input type="number" step="any" class="form-control" name="avg_glucose_level" required>
                    </div>

                    <!-- BMI -->
                    <div class="mb-4">
                        <label for="bmi" class="form-label">BMI:</label>
                        <input type="number" step="any" class="form-control" name="bmi" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary mt-4">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <footer style="background-image: url('{{ url_for('static', filename='img/gallery/footer-bg.png') }}');">
        <div class="footer-wrappr section-bg3">
            <div class="footer-bottom-area">
                <div class="container">
                    <div class="footer-border">
                        <div class="row">

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        <a title="Go to Top" href="#"> <i class="fas fa-level-up-alt"></i></a>
    </div>

    <script src="{{ url_for('static', filename='js/vendor/modernizr-3.5.0.min.js') }}"></script>
