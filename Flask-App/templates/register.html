<!doctype html>
<html class="no-js" lang="zxx">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Login | StrokeSense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <!-- CSS here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1 0 auto;
            background-image: url("{{ url_for('static', filename='img/hero/Main-bg.png') }}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: top center;
            padding-top: 0;
            padding-bottom: 60px;
        }

        .footer-wrappr {
            flex-shrink: 0;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .login-box {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            background: #f9f9f9;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .login-box h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        .login-box .form-group input {
            height: 45px;
        }

        .login-box .btn {
            width: 100%;
        }

        .custom-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1055;
            display: none;
            background-color: #28a745;
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        .custom-toast-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .custom-toast-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            margin-left: 15px;
            cursor: pointer;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- ? Preloader Start -->
    <div id="preloader-active">
        <div class="preloader d-flex align-items-center justify-content-center">
            <div class="preloader-inner position-relative">
                <div class="preloader-circle"></div>
                <div class="preloader-img pere-text">
                    <img src="{{ url_for('static', filename='img/logo/loder.png') }}" alt="">
                </div>
            </div>
        </div>
    </div>
    <!-- Preloader Start -->
    <!-- Header (same as your main template) -->
    <header>
        <!--? Header Start -->
        <div class="header-area">
            <div class="main-header header-sticky">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <!-- Logo -->
                        <div class="col-xl-2 col-lg-2 col-md-1">
                            <div class="logo">
                                <a href="{{ url_for('home') }}"><img
                                        src="{{ url_for('static', filename='img/logo/logo.png') }}" alt=""></a>
                            </div>
                        </div>
                        <div class="col-xl-10 col-lg-10 col-md-10">
                            <div class="menu-main d-flex align-items-center justify-content-end">
                                <!-- Main-menu -->
                                <div class="main-menu f-right d-none d-lg-block">
                                    <nav>
                                        <ul id="navigation">
                                            <li><a href="{{ url_for('home') }}">Home</a></li>
                                            <!-- <li><a href="about.html">About</a></li> -->
                                            <li><a href="{{ url_for('services') }}">Services</a></li>
                                            <!-- <li><a href="contact.html">Contact</a></li> -->
                                            <li><a href="{{ url_for('feedback') }}">Feedback</a></li>
                                        </ul>
                                    </nav>
                                </div>
                                <div class="header-right-btn f-right d-none d-lg-block ml-15">
                                    <a href="{{ url_for('login') }}" class="btn header-btn">Login</a>
                                </div>
                            </div>
                        </div>
                        <!-- Mobile Menu -->
                        <div class="col-12">
                            <div class="mobile_menu d-block d-lg-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Header End -->
    </header>

    <!-- Signup Form Area -->
    <main>
        <div class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Create Your Account</h2>
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="form-group mb-3">
                            <label for="username">Full Name</label>
                            <input type="text" class="form-control" id="username" name="username"
                                placeholder="Enter full name" required>
                        </div>
                        <div class="form-group mb-3">
                            <label for="email">Email address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Enter email"
                                required>
                        </div>
                        <div class="form-group mb-3">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Enter password" required>
                        </div>
                        <div class="form-group mb-4">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                placeholder="Confirm password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block w-100">Sign Up</button>
                        <p class="text-center mt-3">
                            Already have an account?
                            <a href="{{ url_for('login') }}" style="color: #5AAC4E; text-decoration: underline;">Login
                                here</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>


    <!-- Footer -->
    <footer style="background-image: url('{{ url_for('static', filename='img/gallery/footer-bg.png') }}');">
        <div class="footer-wrappr section-bg3">
            <div class="footer-bottom-area">
                <div class="container">
                    <div class="footer-border">
                        <div class="row">
                            <div class="col-xl-10">
                                <div class="footer-copy-right">
                                    <p>© 2025 StrokeSense - All rights reserved.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>


    <!-- JS here -->
    <script src="{{ url_for('static', filename='js/vendor/modernizr-3.5.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/vendor/jquery-1.12.4.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popper.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.slicknav.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/owl.carousel.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/slick.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animated.headline.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.nice-select.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.sticky.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.magnific-popup.js') }}"></script>
    <script src="{{ url_for('static', filename='js/plugins.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <script>
        window.onload = function () {
            const preloader = document.getElementById('preloader-active');
            if (preloader) {
                preloader.style.display = 'none';
            }
        };
    </script>

    <!-- Toast Notification (Custom) -->
    <div class="custom-toast" id="custom-toast">
        <div class="custom-toast-body">
            <span id="toast-message"></span>
            <button class="custom-toast-close" id="close-toast">&times;</button>
        </div>
    </div>

    <!-- JS for Flash Messages and Custom Toast -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            {% with messages = get_flashed_messages(with_categories = true) %}
            {% if messages %}
            // Loop through all flash messages
            {% for category, message in messages %}
            // Set toast message
            document.getElementById('toast-message').textContent = "{{ message }}";

            // Set the background color for the toast based on message category (e.g., 'danger')
            const toast = document.getElementById('custom-toast');
            if ("{{ category }}" == "danger") {
                toast.style.backgroundColor = '#dc3545';  // Red for errors
            } else {
                toast.style.backgroundColor = '#28a745';  // Green for success
            }

            // Show the toast
            toast.style.display = 'block';

            // Hide the toast after 4 seconds
            setTimeout(function () {
                toast.style.display = 'none';
            }, 4000);
            {% endfor %}
            {% endif %}
            {% endwith %}

            // Close toast when user clicks on the close button
            document.getElementById('close-toast').addEventListener('click', function () {
                document.getElementById('custom-toast').style.display = 'none';
            });
        });

    </script>
</body>

</html>
